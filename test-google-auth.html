<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Auth Test - Request Buddy</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      max-width: 600px;
      width: 100%;
    }
    
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }
    
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    
    .button {
      background: #4285f4;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: all 0.2s;
      margin: 5px;
    }
    
    .button:hover {
      background: #357ae8;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(66, 133, 244, 0.4);
    }
    
    .button:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }
    
    .button.secondary {
      background: #34a853;
    }
    
    .button.secondary:hover {
      background: #2d9348;
    }
    
    .button.tertiary {
      background: #ea4335;
    }
    
    .button.tertiary:hover {
      background: #d33426;
    }
    
    .log {
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      margin-top: 20px;
      max-height: 400px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 12px;
    }
    
    .log-entry {
      margin: 5px 0;
      padding: 5px;
      border-left: 3px solid transparent;
    }
    
    .log-entry.info {
      border-left-color: #4285f4;
      color: #1967d2;
    }
    
    .log-entry.success {
      border-left-color: #34a853;
      color: #188038;
    }
    
    .log-entry.error {
      border-left-color: #ea4335;
      color: #c5221f;
    }
    
    .log-entry.warning {
      border-left-color: #fbbc04;
      color: #f29900;
    }
    
    .user-info {
      background: #e8f5e9;
      border: 1px solid #4caf50;
      border-radius: 8px;
      padding: 15px;
      margin-top: 20px;
      display: none;
    }
    
    .user-info.show {
      display: block;
    }
    
    .user-info h3 {
      color: #2e7d32;
      margin-bottom: 10px;
    }
    
    .user-info p {
      margin: 5px 0;
      color: #1b5e20;
    }
    
    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }
    
    .clear-btn {
      background: #666;
      font-size: 14px;
      padding: 8px 16px;
    }
    
    .clear-btn:hover {
      background: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 Google Auth Test</h1>
    <p class="subtitle">Test Google Authentication for Request Buddy</p>
    
    <div class="buttons">
      <button class="button" onclick="testPopupSignIn()">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Test Popup Sign-In
      </button>
      
      <button class="button secondary" onclick="testRedirectSignIn()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 18l6-6-6-6"/>
        </svg>
        Test Redirect Sign-In
      </button>
      
      <button class="button tertiary" onclick="signOutUser()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Sign Out
      </button>
      
      <button class="button clear-btn" onclick="clearLog()">Clear Log</button>
    </div>
    
    <div class="user-info" id="userInfo">
      <h3>✅ Signed In</h3>
      <p><strong>Email:</strong> <span id="userEmail"></span></p>
      <p><strong>Name:</strong> <span id="userName"></span></p>
      <p><strong>UID:</strong> <span id="userUid"></span></p>
    </div>
    
    <div class="log" id="log">
      <div class="log-entry info">Ready to test Google Authentication...</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js'
    import { 
      getAuth, 
      GoogleAuthProvider,
      signInWithPopup,
      signInWithRedirect,
      getRedirectResult,
      signOut,
      onAuthStateChanged
    } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js'

    // Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyBIh1_3IjaxvAhQaAFulnkfWPVT7uIgZKM",
      authDomain: "teamapi-96507.firebaseapp.com",
      projectId: "teamapi-96507",
      storageBucket: "teamapi-96507.firebasestorage.app",
      messagingSenderId: "1083620222554",
      appId: "1:1083620222554:web:cb21991938b07b55ceda63",
      measurementId: "G-DSNJS0KD6J"
    }

    // Initialize Firebase
    const app = initializeApp(firebaseConfig)
    const auth = getAuth(app)
    const googleProvider = new GoogleAuthProvider()
    
    // Configure Google Provider
    googleProvider.setCustomParameters({
      prompt: 'select_account'
    })
    googleProvider.addScope('profile')
    googleProvider.addScope('email')

    // Logging functions
    function log(message, type = 'info') {
      const logDiv = document.getElementById('log')
      const entry = document.createElement('div')
      entry.className = `log-entry ${type}`
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`
      logDiv.appendChild(entry)
      logDiv.scrollTop = logDiv.scrollHeight
      console.log(`[${type.toUpperCase()}]`, message)
    }

    function updateUserInfo(user) {
      const userInfo = document.getElementById('userInfo')
      if (user) {
        document.getElementById('userEmail').textContent = user.email
        document.getElementById('userName').textContent = user.displayName || 'N/A'
        document.getElementById('userUid').textContent = user.uid
        userInfo.classList.add('show')
      } else {
        userInfo.classList.remove('show')
      }
    }

    // Test functions
    window.testPopupSignIn = async function() {
      log('🔵 Starting popup sign-in...', 'info')
      try {
        const result = await signInWithPopup(auth, googleProvider)
        log('✅ Popup sign-in successful!', 'success')
        log(`   Email: ${result.user.email}`, 'success')
        log(`   Name: ${result.user.displayName}`, 'success')
        log(`   UID: ${result.user.uid}`, 'success')
        updateUserInfo(result.user)
      } catch (error) {
        log(`❌ Popup sign-in failed: ${error.code}`, 'error')
        log(`   Message: ${error.message}`, 'error')
        
        if (error.code === 'auth/popup-blocked') {
          log('💡 Popup was blocked. Try allowing popups or use redirect method.', 'warning')
        } else if (error.code === 'auth/unauthorized-domain') {
          log('💡 Domain not authorized. Add to Firebase Console.', 'warning')
        }
      }
    }

    window.testRedirectSignIn = async function() {
      log('🔵 Starting redirect sign-in...', 'info')
      log('   You will be redirected to Google...', 'info')
      try {
        await signInWithRedirect(auth, googleProvider)
      } catch (error) {
        log(`❌ Redirect sign-in failed: ${error.code}`, 'error')
        log(`   Message: ${error.message}`, 'error')
      }
    }

    window.signOutUser = async function() {
      log('🔵 Signing out...', 'info')
      try {
        await signOut(auth)
        log('✅ Signed out successfully', 'success')
        updateUserInfo(null)
      } catch (error) {
        log(`❌ Sign out failed: ${error.message}`, 'error')
      }
    }

    window.clearLog = function() {
      document.getElementById('log').innerHTML = '<div class="log-entry info">Log cleared.</div>'
    }

    // Check for redirect result on page load
    log('🔍 Checking for redirect result...', 'info')
    getRedirectResult(auth)
      .then((result) => {
        if (result) {
          log('✅ Redirect result found!', 'success')
          log(`   Email: ${result.user.email}`, 'success')
          log(`   Name: ${result.user.displayName}`, 'success')
          updateUserInfo(result.user)
        } else {
          log('ℹ️  No pending redirect result', 'info')
        }
      })
      .catch((error) => {
        log(`❌ Redirect result error: ${error.code}`, 'error')
        log(`   Message: ${error.message}`, 'error')
      })

    // Listen for auth state changes
    onAuthStateChanged(auth, (user) => {
      if (user) {
        log(`👤 Auth state: Signed in as ${user.email}`, 'info')
        updateUserInfo(user)
      } else {
        log('👤 Auth state: Not signed in', 'info')
        updateUserInfo(null)
      }
    })

    log('✅ Firebase initialized successfully', 'success')
    log(`   Project: ${firebaseConfig.projectId}`, 'info')
    log(`   Auth Domain: ${firebaseConfig.authDomain}`, 'info')
  </script>
</body>
</html>
